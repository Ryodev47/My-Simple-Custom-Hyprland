# =====================================================
# HYPRLOCK CONFIGURATION - SPACIOUS HIGH PANEL
# =====================================================

# 1. BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/hyprlock.png
    blur_passes = 0
    blur_size = 0
}

# 2. SHAPE
shape {
    monitor = 
    size = 650, 100%
    color = rgba(0, 0, 0, 0.4)
    position = 0, 0
    halign = left
    valign = center
}

# -----------------------------------------------------
# CONTENT - SPREAD OUT VERTICALLY (X = -660)
# -----------------------------------------------------

# FOTO PROFIL (Paling Atas)
image {
    monitor =
    path = ~/.config/hypr/vivek.png
    size = 150
    rounding = -1
    border_size = 3
    border_color = rgba(255, 255, 255, 0.5)
    position = -630, 430          # Posisi tetap tinggi
    halign = center
    valign = center
}

# JAM (Diberi jarak lebar dari Foto)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(255, 255, 255, 0.8)
    font_size = 85
    font_family = SF Pro Display Bold
    position = -630, 250          # Diturunkan sedikit dari 280 agar berjarak dari foto
    halign = center
    valign = center
}

# HARI & TANGGAL (Diberi jarak dari Jam)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 22
    font_family = SF Pro Display Bold
    position = -630, 160          # Diturunkan dari 210 agar renggang dari jam
    halign = center
    valign = center
}

# NAMA USER (Diberi jarak lebar dari Tanggal)
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 24
    font_family = SF Pro Display Bold
    position = -630, 30           # Diturunkan dari 100 agar renggang dari tanggal
    halign = center
    valign = center
}

# INPUT FIELD (PASSWORD - Berjarak dari Nama User)
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 0
    dots_center = true
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##ffffff99">🔒 Enter Password</span></i>
    position = -630, -70          # Diturunkan dari 20 ke -70
    halign = center
    valign = center
}

# -----------------------------------------------------
# POWER BUTTONS (Berjarak dari Input Field)
# -----------------------------------------------------

# REBOOT
label {
    monitor =
    text = <span font_family='JetBrainsMono Nerd Font'>󰑓 </span>
    color = rgba(255, 255, 255, 0.7)
    font_size = 32
    position = -630, -200         # Diturunkan dari -80 ke -200
    halign = center
    valign = center
    onclick = reboot
}

# SHUTDOWN
label {
    monitor =
    text = <span font_family='JetBrainsMono Nerd Font'> </span>
    color = rgba(255, 80, 80, 0.8)
    font_size = 32
    position = -730, -200
    halign = center
    valign = center
    onclick = shutdown now
}

# SUSPEND
label {
    monitor =
    text = <span font_family='JetBrainsMono Nerd Font'>󰤄 </span>
    color = rgba(255, 255, 255, 0.7)
    font_size = 32
    position = -530, -200
    halign = center
    valign = center
    onclick = systemctl suspend
}
